  function tampilMakanan(data){

    let html = "";

    data.forEach(item=>{

        html += `

        <div class="food-card">

            <h2>${item.nama}</h2>

            <div class="food-info">

                <div class="food-badge">
                🔥 ${item.kalori}
                </div>

                <div class="food-badge">
                🥩 ${item.protein}
                </div>

                <div class="food-badge">
                🌾 ${item.karbo}
                </div>

                <div class="food-badge">
                🥑 ${item.lemak}
                </div>

            </div>

            <p class="food-description">
                ${item.deskripsi}
            </p>

        </div>

        `;

    });

    document.getElementById(
        "food-container"
    ).innerHTML = html;

}

function searchFood(){

    const keyword =

    .getElementById(
        "search-food"

    .value
    .toLowerCase();

    const hasil =
    makanan.filter(item=>

        item.nama
        .toLowerCase()
        .includes(keyword)

    );

    tampilMakanan(hasil);

}

    "block";

}

window.onload = function(){

    const nama =
    localStorage.getItem(
        "gempurgizi_user"
    );

    if(nama){

        startApp();

    }

}
